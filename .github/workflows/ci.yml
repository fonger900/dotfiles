name: Dotfiles CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # 1. Linting Job: Quick checks for style and blatant errors
  lint:
    name: 🎨 Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linting Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck yamllint

      - name: ShellCheck
        run: |
          # Check all shell scripts and zsh files
          find . -type f \( -name "*.sh" -o -name "*.zsh" \) -not -path "*/.oh-my-zsh/*" | xargs shellcheck -s bash

      - name: YAML Lint
        run: yamllint .

      - name: Cache StyLua
        id: cache-stylua
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/stylua
          key: ${{ runner.os }}-stylua-v0.20.0

      - name: Install StyLua
        if: steps.cache-stylua.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://github.com/JohnnyMorganz/StyLua/releases/download/v0.20.0/stylua-linux-x86_64.zip -o stylua.zip
          unzip stylua.zip
          sudo mv stylua /usr/local/bin/

      - name: StyLua Check
        run: stylua --check .

  # 2. Syntax Job: Deep validation of configuration logic
  syntax:
    name: 🔍 Syntax Validation
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Validation Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh ansible ansible-lint

      - name: Zsh Syntax Check
        run: |
          # Validate syntax for all .zsh files
          find . -name "*.zsh" -exec zsh -n {} +
          # Specifically check the main zshrc if it exists in the package
          [ -f zsh/.zshrc ] && zsh -n zsh/.zshrc || echo "zsh/.zshrc not found, skipping specific check."

      - name: Check Lua Syntax (WezTerm)
        run: |
          if [ -f wezterm/.config/wezterm/wezterm.lua ]; then
            luajit -bl wezterm/.config/wezterm/wezterm.lua > /dev/null
          fi

      - name: Check Lua Syntax (Neovim)
        run: |
          if [ -d nvim/.config/nvim/lua ]; then
            find nvim/.config/nvim/lua -name "*.lua" -exec luajit -bl {} + > /dev/null
          fi

      - name: Ansible Lint & Syntax Check
        run: |
          ansible-lint ansible/playbook.yml
          ansible-playbook ansible/playbook.yml -i ansible/inventory --syntax-check

  # 3. Installation Job: Practical test of the bootstrap process
  test-bootstrap:
    name: 🚀 Bootstrap Check
    needs: [lint, syntax]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Mise
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Run Bootstrap (Ansible Dry-Run)
        run: |
          sudo apt-get update && sudo apt-get install -y ansible
          ansible-playbook -i ansible/inventory ansible/playbook.yml --check
