name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y stow shellcheck curl

      - name: Install stylua
        run: |
          cargo install stylua || (curl -fsSL https://github.com/JohnnyMorganz/StyLua/releases/latest/download/stylua-linux.zip -o stylua.zip && unzip stylua.zip && sudo mv stylua /usr/local/bin/)

      - name: Run Tests
        run: |
          chmod +x scripts/test.sh
          chmod +x install.sh
          ./scripts/test.sh
