name: Dotfiles CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # 1. Filter: Detect which paths have changed to optimize subsequent jobs
  changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    outputs:
      ansible: ${{ steps.filter.outputs.ansible }}
      zsh: ${{ steps.filter.outputs.zsh }}
      lua: ${{ steps.filter.outputs.lua }}
      scripts: ${{ steps.filter.outputs.scripts }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ansible:
              - 'ansible/**'
              - '.github/workflows/ci.yml'
            zsh:
              - 'zsh/**'
              - '.github/workflows/ci.yml'
            lua:
              - 'nvim/**'
              - 'wezterm/**'
              - '.github/workflows/ci.yml'
            scripts:
              - 'scripts/**'
              - 'bootstrap.sh'
              - '.github/workflows/ci.yml'

  # 2. Linting: Fast style checks
  lint:
    name: 🎨 Linting
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        if: needs.changes.outputs.zsh == 'true' || needs.changes.outputs.scripts == 'true'
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './zsh ./scripts'
          format: tty
          severity: warning

      - name: YAML Lint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: '.'
          config_file: '.yamllint'

      - name: StyLua Check
        if: needs.changes.outputs.lua == 'true'
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: v0.20.0
          args: --check .

  # 3. Syntax Validation: Matrix build for Ubuntu and macOS
  syntax:
    name: 🔍 Syntax Validation (${{ matrix.os }})
    needs: [changes, lint]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Zsh Syntax Check
        if: needs.changes.outputs.zsh == 'true'
        run: |
          find . -name "*.zsh" -exec zsh -n {} +
          [ -f zsh/.zshrc ] && zsh -n zsh/.zshrc || echo "Optional zshrc not found."

      - name: Lua Syntax Check (WezTerm)
        if: needs.changes.outputs.lua == 'true'
        run: |
          if [ -f wezterm/.config/wezterm/wezterm.lua ]; then
            # We use luajit if available (Ubuntu), else standard lua
            (command -v luajit > /dev/null && luajit -bl wezterm/.config/wezterm/wezterm.lua) || \
            (command -v lua > /dev/null && lua -v && luajit -bl wezterm/.config/wezterm/wezterm.lua) || \
            echo "Lua runtime not found for syntax check."
          fi

      - name: Ansible Lint
        if: matrix.os == 'ubuntu-latest' && needs.changes.outputs.ansible == 'true'
        uses: ansible/ansible-lint-action@v6
        with:
          path: "ansible/"

      - name: Ansible Playbook Syntax Check
        if: needs.changes.outputs.ansible == 'true'
        run: |
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            sudo apt-get update && sudo apt-get install -y ansible
          else
            brew install ansible
          fi
          ansible-playbook ansible/playbook.yml -i ansible/inventory --syntax-check

  # 4. Bootstrap Check: Verify dry-run of the installer
  test-bootstrap:
    name: 🚀 Bootstrap Check (${{ matrix.os }})
    needs: [changes, syntax]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Mise
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Run Ansible Dry-Run
        run: |
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            sudo apt-get update && sudo apt-get install -y ansible
          else
            brew install ansible
          fi
          ansible-playbook -i ansible/inventory ansible/playbook.yml --check
