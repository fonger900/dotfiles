# ============================================================================
# Starship Configuration - Minimal & Clean
# ============================================================================
# A fast, customizable, and distraction-free prompt for fullstack development.
# For detailed documentation, visit: https://starship.rs/config/

format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$rust\
$golang\
$docker_context\
$cmd_duration\
$line_break\
$character """

scan_timeout = 1000
command_timeout = 5000

# ============================================================================
# Core Modules
# ============================================================================

[directory]
truncation_length = 2
truncate_to_repo = true
format = "[$path]($style) "
style = "bold 33"
read_only = " "
read_only_style = "red"
truncation_symbol = "…/"
home_symbol = "~"

[git_branch]
symbol = ""
format = "[$symbol$branch]($style) "
style = "bold magenta"
disabled = false

[git_status]
# Optimized for WSL speed
format = '([$all_status$ahead_behind]($style) )'
style = "bold yellow"
disabled = false
conflicted = "="
ahead = "⇡"
behind = "⇣"
diverged = "⇕"
untracked = "?"
stashed = "≡"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"
up-to-date = ""

# ============================================================================
# Language & Tool Modules
# ============================================================================

[package]
disabled = true # Slow in WSL

[nodejs]
symbol = "📦"
format = "[$symbol($version)]($style) "
style = "green"

[python]
symbol = "🐍"
format = "[$symbol($version)]($style) "
style = "yellow"

[rust]
symbol = "🦀 "
format = "[$symbol($version)]($style) "
style = "bold red"

[golang]
symbol = "🐹 "
format = "[$symbol($version)]($style) "
style = "bold cyan"

[docker_context]
symbol = "🐳"
format = "[$symbol($context)]($style) "
style = "blue"
disabled = false

# ============================================================================
# Utilities
# ============================================================================

[cmd_duration]
min_time = 1000
format = "[$duration]($style) "
style = "bold yellow"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"
