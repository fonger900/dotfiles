# ==========================================
# Ghostty Terminal Configuration
# ==========================================
# Fast, native, feature-rich terminal emulator
# https://ghostty.org

# ==========================================
# Theme and Colors
# ==========================================
# Use a built-in theme or define custom colors
# Available themes: https://github.com/ghostty-org/ghostty/tree/main/src/config/themes
theme = Catppuccin Mocha

# Custom colors (uncomment to override theme)
# background = #1e1e2e
# foreground = #cdd6f4
# cursor-color = #f5e0dc
# selection-background = #585b70
# selection-foreground = #cdd6f4

# ==========================================
# Font Configuration
# ==========================================
font-family = JetBrainsMono Nerd Font
font-size = 12.5

# Font features
font-style = normal
font-style-bold = bold
font-style-italic = italic
font-style-bold-italic = bold-italic

# Additional font options
font-thicken = true
adjust-cell-height = 0
adjust-cell-width = 0

# ==========================================
# Window Appearance
# ==========================================
window-padding-x = 8
window-padding-y = 8
window-padding-balance = true
window-decoration = true
window-theme = auto

# macOS specific
macos-titlebar-style = tabs
macos-option-as-alt = true

# ==========================================
# Cursor Configuration
# ==========================================
cursor-style = block
cursor-style-blink = true
cursor-text = #1e1e2e

# ==========================================
# Mouse and Interaction
# ==========================================
mouse-hide-while-typing = true
copy-on-select = true
clipboard-read = allow
clipboard-write = allow

# ==========================================
# Shell Integration
# ==========================================
shell-integration = detect
shell-integration-features = cursor,sudo,title

# ==========================================
# Performance
# ==========================================
# Ghostty is already very fast, but you can tune these
resize-overlay = never
resize-overlay-position = center
resize-overlay-duration = 0

# ==========================================
# Scrollback
# ==========================================
scrollback-limit = 10000

# ==========================================
# Tab Configuration
# ==========================================
# Key bindings for tabs (macOS style)
keybind = cmd+t=new_tab
keybind = cmd+w=close_surface
keybind = cmd+shift+[=previous_tab
keybind = cmd+shift+]=next_tab
keybind = cmd+1=goto_tab:1
keybind = cmd+2=goto_tab:2
keybind = cmd+3=goto_tab:3
keybind = cmd+4=goto_tab:4
keybind = cmd+5=goto_tab:5
keybind = cmd+6=goto_tab:6
keybind = cmd+7=goto_tab:7
keybind = cmd+8=goto_tab:8
keybind = cmd+9=goto_tab:9

# ==========================================
# Split Panes
# ==========================================
keybind = cmd+d=new_split:right
keybind = cmd+shift+d=new_split:down
keybind = cmd+shift+w=close_surface

# Navigate between splits
keybind = cmd+h=goto_split:left
keybind = cmd+j=goto_split:bottom
keybind = cmd+k=goto_split:top
keybind = cmd+l=goto_split:right

# Resize splits
keybind = cmd+ctrl+h=resize_split:left,10
keybind = cmd+ctrl+j=resize_split:down,10
keybind = cmd+ctrl+k=resize_split:up,10
keybind = cmd+ctrl+l=resize_split:right,10

# ==========================================
# Font Size Adjustments
# ==========================================
keybind = cmd+equal=increase_font_size:1
keybind = cmd+minus=decrease_font_size:1
keybind = cmd+0=reset_font_size

# ==========================================
# Text Selection and Search
# ==========================================
keybind = cmd+c=copy_to_clipboard
keybind = cmd+v=paste_from_clipboard
keybind = cmd+f=toggle_quick_terminal

# ==========================================
# Miscellaneous
# ==========================================
keybind = cmd+k=clear_screen
keybind = cmd+,=reload_config
keybind = cmd+n=new_window

# Fullscreen
keybind = cmd+ctrl+f=toggle_fullscreen

# ==========================================
# URL and Link Handling
# ==========================================
# Automatically detect and open URLs
link-url = true

# ==========================================
# Advanced Features
# ==========================================
# Confirm before closing with running processes
confirm-close-surface = true

# Auto-update (macOS)
auto-update = check

# ==========================================
# Developers / Debugging
# ==========================================
# Uncomment for debugging
# gtk-single-instance = false
# quit-after-last-window-closed = true
