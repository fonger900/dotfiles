# ==========================================
# Performance-Optimized Tmux Configuration
# ==========================================

# ==========================================
# Essential Plugins Only
# ==========================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# ==========================================
# Persistence Settings
# ==========================================
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-save-pane-titles 'on'

# ==========================================
# Performance Settings
# ==========================================
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm*:Tc:smkx=\E[?1h:rmkx=\E[?1l"
set -as terminal-overrides ",*:Setulc=\E[58:2::%p1%{65536}%/%d:%p1%{256}%/%&%d:%p1%{255}%&%d%;m"  # undercurl support
set -as terminal-overrides ",*:Ms=\E]52;%p1%s;%p2%s\a" # OSC 52
set -g allow-passthrough on
set -s set-clipboard on # Enable OSC 52 clipboard for WezTerm compatibility

# Faster escape sequences
set -g escape-time 0
set -g repeat-time 300

# Optimized history
set -g history-limit 5000

# Mouse support
set -g mouse on

# Window/pane indexing
set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on

# Focus events
set -g focus-events on

# ==========================================
# Prefix & Key Bindings
# ==========================================
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Quick reload
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Pane management
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vim-style navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Popup windows
bind g display-popup -E -d "#{pane_current_path}" -w 80% -h 80%
bind G display-popup -E -d "#{pane_current_path}" -w 80% -h 80% "git status && exec zsh"
bind C-g display-popup -E -d "#{pane_current_path}" -w 90% -h 90% "lazygit"
bind C-d display-popup -E -d "#{pane_current_path}" -w 90% -h 90% "lazydocker"
bind C-c display-popup -E -d "#{pane_current_path}" -w 90% -h 90% "container ls && exec zsh"

# Resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Copy mode
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ==========================================
# Minimal Status Bar & Theme
# ==========================================
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Catppuccin plugin settings
set -g @catppuccin_flavour 'mocha'
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_status_background "#1e1e2e"

# Window indicators styling
setw -g window-status-current-style "fg=#89b4fa,bg=#313244,bold"
setw -g window-status-style "fg=#6c7086,bg=#1e1e2e"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "

# Status Right (Prefix, Zoom, Session)
set -g status-left ""
set -g status-right "#{?client_prefix,#[fg=#fab387]#[bg=#313244] 󱊔 PREFIX ,}#{?pane_in_mode,#[fg=#f38ba8]#[bg=#313244]  COPY ,}#{?window_zoomed_flag,#[fg=#a6e3a1]#[bg=#313244] 󰁌 ZOOM ,}#[fg=#b4befe,bg=#313244]  #S "

# Ensure window titles are automatically renamed
set-option -g allow-rename on
set-option -g automatic-rename on


# ==========================================
# Plugin Manager
# ==========================================
run '~/.tmux/plugins/tpm/tpm'
