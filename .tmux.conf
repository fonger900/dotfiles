
#---------------------------------------------------------
#  Shadow Gardener – tmux.conf (v4 · Catppuccin Powerline)
#---------------------------------------------------------
#  Plugins (TPM):
#    - tmux-plugins/tpm             → plugin manager
#    - tmux-plugins/tmux-battery    → battery % + icon
#    - tmux-plugins/tmux-cpu        → CPU load bar
#    - catppuccin/tmux              → color palette helpers
#---------------------------------------------------------
#  Install once:
#    git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
#    <prefix> + I  # install plugins
#---------------------------------------------------------

## 0. Basics ------------------------------------------------------
set -g mouse on
set -g history-limit 20000
set -g base-index 1
setw -g pane-base-index 1
setw -g mode-keys vi
set -s escape-time 0

## 1. Prefix ------------------------------------------------------
set -g prefix C-a
unbind C-b
bind C-a send-prefix

## 2. Navigation --------------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

## 3. Split & Resize ---------------------------------------------
bind v split-window -h    # vertical split (left | right)
bind s split-window -v    # horizontal split (top / bottom)

bind -r H resize-pane -L 5
bind -r L resize-pane -R 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3

## 4. Kill --------------------------------------------------------
bind x kill-pane
bind q kill-session

## 5. Quick session ----------------------------------------------
#   C-n  → session "hermit" (create if absent)
bind-key C-n new-session -A -s hermit

## 6. Automatic window naming ------------------------------------
set -g automatic-rename on
set -g automatic-rename-format "#S#I#(basename '#{pane_current_path}')"

bind $ command-prompt -I "#S" "rename-session '%%'"

## 7. Color theme -------------------------------------------------
#   Uses Catppuccin palette (macchiato)
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator ""
set -g @catppuccin_window_middle_separator ""
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_default_fill "number,icon,title"
set -g @catppuccin_status_modules_right "date time battery cpu"
set -g @catppuccin_status_left_separator ""
set -g @catppuccin_status_right_separator ""
run '~/.tmux/plugins/catppuccin/tmux/catppuccin.tmux'

## 8. Status bar extra -------------------------------------------
set -g status-interval 5
set -g status-justify centre

# Left: session + host
set -g status-left-length 40
set -g status-left "#[fg=#94e2d5,bold] #[fg=#f2cdcd]#S #[fg=#585b70]| #[fg=#89b4fa]#H #[default]"

# Right: CPU ▇▇▁ battery 🔋 77%  |  14:03  14‑05‑25
set -g status-right-length 120
set -g status-right '#(tmux-cpu --interval 2 --chart --spark)  #(tmux-battery -t "🔌 %I %p%%" -c "🔋 %p%%") #[fg=#a6e3a1]%H:%M #[fg=#f5c2e7]%d-%m-%y'

# Pane border
set -g pane-border-style 'fg=#45475a'
set -g pane-active-border-style 'fg=#89b4fa'

# Window styles
set-window-option -g window-status-current-format '#[fg=#f5c2e7,bold]#I:#W#[default]'
set-window-option -g window-status-format '#[fg=#585b70]#I:#W#[default]'

## 9. TPM ---------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'catppuccin/tmux'
run '~/.tmux/plugins/tpm/tpm'

#---------------------------------------------------------
#  End of tmux.conf v4
#---------------------------------------------------------
