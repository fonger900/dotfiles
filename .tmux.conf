# Catppuccin Theme for Tmux
# https://github.com/catppuccin/tmux

set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavour 'mocha' # or latte, frappe, macchiato

# General settings
set -g default-terminal "screen-256color"
set-option -sa terminal-overrides ",xterm*:Tc"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on
set -g history-limit 100000
set -g escape-time 0
set -g focus-events on

# Prefix key (Ctrl+a)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Keybindings to match Wezterm
# Wezterm: CTRL|SHIFT + o -> SplitHorizontal (vertical split in tmux)
# Wezterm: CTRL|SHIFT + e -> SplitVertical (horizontal split in tmux)
# Wezterm: CTRL|SHIFT + t -> New Tab (new window in tmux)
bind -n C-S-o split-window -v -c "#{pane_current_path}"
bind -n C-S-e split-window -h -c "#{pane_current_path}"
bind -n C-S-t new-window -c "#{pane_current_path}"

# Pane navigation (Vim-like + Alt, matches Wezterm)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Window navigation
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Pane resizing
bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5

# Quick config reload
bind r source-file ~/.tmux.conf \; display-message "🚀 Tmux config reloaded!"

# Plugin manager setup (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Plugin configurations
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-boot 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
