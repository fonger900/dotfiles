# ==========================================
# Tmux Configuration for Fullstack Development
# Author: fonger
# Updated: 2025-11-14
# ==========================================

# ==========================================
# Plugin Manager (TPM) - Install First
# ==========================================
# Install TPM: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'

# ==========================================
# General Settings
# ==========================================
# Enable 256 color support
set -g default-terminal "screen-256color"
set-option -sa terminal-overrides ",xterm*:Tc"
set-option -ga terminal-overrides ",xterm-256color:Tc"

# Enable mouse support
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set-option -g renumber-windows on

# Increase scrollback buffer size
set -g history-limit 100000

# Faster command sequences (no delay)
set -g escape-time 0

# Focus events enabled for vim autoread
set -g focus-events on

# Aggressive resize for better multi-monitor support
setw -g aggressive-resize on

# Enable activity monitoring
setw -g monitor-activity on
set -g visual-activity off

# ==========================================
# Prefix Key Configuration
# ==========================================
# Change prefix from Ctrl+b to Ctrl+a (more ergonomic)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Quick reload of config file
bind r source-file ~/.tmux.conf \; display-message "🚀 Tmux config reloaded!"

# ==========================================
# Window & Pane Management
# ==========================================
# Split panes with intuitive keys (matching Wezterm)
bind -n C-S-o split-window -v -c "#{pane_current_path}"
bind -n C-S-e split-window -h -c "#{pane_current_path}"

# Traditional split keys (also available)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"

# New window with current path
bind -n C-S-t new-window -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Kill pane/window without confirmation
bind x kill-pane
bind X kill-window
bind q kill-pane

# ==========================================
# Pane Navigation (Vim-style + Alt)
# ==========================================
# Smart pane switching with awareness of Vim splits
# These bindings work seamlessly with vim-tmux-navigator
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Alternative navigation with prefix
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ==========================================
# Pane Resizing
# ==========================================
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Fine-grained resizing
bind -r C-h resize-pane -L 1
bind -r C-j resize-pane -D 1
bind -r C-k resize-pane -U 1
bind -r C-l resize-pane -R 1

# Zoom pane (maximize/restore)
bind z resize-pane -Z

# ==========================================
# Window Navigation
# ==========================================
# Quick window switching with Alt+number
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Next/Previous window
bind -n M-n next-window
bind -n M-p previous-window

# Move windows left/right
bind -n M-< swap-window -t -1\; select-window -t -1
bind -n M-> swap-window -t +1\; select-window -t +1

# ==========================================
# Copy Mode (Vim-style)
# ==========================================
# Enter copy mode
bind Enter copy-mode
bind -n M-[ copy-mode

# Vi-style key bindings in copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel
bind -T copy-mode-vi H send-keys -X start-of-line
bind -T copy-mode-vi L send-keys -X end-of-line

# Copy to system clipboard (macOS)
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Paste from clipboard
bind p paste-buffer
bind P choose-buffer

# ==========================================
# Status Bar Configuration
# ==========================================
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 2

# Catppuccin theme configuration
set -g @catppuccin_flavour 'mocha'
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"

set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"

set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"

set -g @catppuccin_status_modules_right "directory user host session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

set -g @catppuccin_directory_text "#{pane_current_path}"

# ==========================================
# Session Management Shortcuts
# ==========================================
# Session navigation
bind s choose-session
bind S command-prompt -p "New session name:" "new-session -s '%%'"

# Switch to last session
bind L switch-client -l

# Detach from session
bind d detach-client

# ==========================================
# Development-Specific Layouts
# ==========================================
# Layout 1: Fullstack Dev (editor + server + logs)
bind M-f split-window -h -p 30 -c "#{pane_current_path}" \; \
  split-window -v -p 50 -c "#{pane_current_path}" \; \
  select-pane -L \; \
  display-message "💻 Fullstack layout ready"

# Layout 2: Three column (code + terminal + docs)
bind M-3 split-window -h -p 33 -c "#{pane_current_path}" \; \
  split-window -h -p 50 -c "#{pane_current_path}" \; \
  select-pane -L \; \
  select-pane -L \; \
  display-message "📊 Three-column layout ready"

# Layout 3: Docker monitoring (main + docker ps + logs)
bind M-d split-window -h -p 40 -c "#{pane_current_path}" \; \
  send-keys 'docker ps -a' C-m \; \
  split-window -v -p 50 -c "#{pane_current_path}" \; \
  send-keys 'docker stats' C-m \; \
  select-pane -L \; \
  display-message "🐳 Docker layout ready"

# Reset to single pane
bind M-0 kill-pane -a

# ==========================================
# Plugin Configurations
# ==========================================
# tmux-resurrect: Save and restore sessions
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-save-shell-history 'on'

# tmux-continuum: Automatic session save/restore
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @continuum-boot 'on'
set -g @continuum-boot-options 'iterm,fullscreen'

# Manual save/restore bindings
bind C-s run-shell ~/.tmux/plugins/tmux-resurrect/scripts/save.sh
bind C-r run-shell ~/.tmux/plugins/tmux-resurrect/scripts/restore.sh

# ==========================================
# Search & Filter
# ==========================================
# Search back through buffer
bind / copy-mode \; send-keys ?

# ==========================================
# Popup Windows (Tmux 3.2+)
# ==========================================
# Quick terminal popup
bind g display-popup -E -w 80% -h 80% -d "#{pane_current_path}"

# Git status popup
bind G display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "git status && echo '' && echo 'Press ENTER to close' && read"

# Lazygit popup (if installed)
bind C-g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"

# Docker compose popup
bind C-d display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "docker-compose ps && echo '' && echo 'Press ENTER to close' && read"

# ==========================================
# Nested Tmux Session Handling
# ==========================================
# Toggle key bindings for nested sessions
bind -T root F12 \
  set prefix None \;\
  set key-table off \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  refresh-client -S

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  refresh-client -S

# ==========================================
# Advanced Features
# ==========================================
# Synchronize panes (send commands to all panes in window)
bind S set-window-option synchronize-panes\; display-message "Synchronize panes: #{?pane_synchronized,ON,OFF}"

# Clear screen and scrollback
bind C-k send-keys -R \; clear-history

# Join pane from another window
bind j command-prompt -p "Join pane from window:" "join-pane -h -s '%%'"

# Break pane to new window
bind b break-pane

# Swap windows
bind-key -r "<" swap-window -d -t -1
bind-key -r ">" swap-window -d -t +1

# ==========================================
# Tmux Plugin Manager - KEEP AT BOTTOM
# ==========================================
# Install TPM if not already installed:
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
#
# To install plugins:
# 1. Press prefix + I (capital i) to fetch plugins
# 2. Press prefix + U to update plugins
# 3. Press prefix + alt + u to uninstall plugins not in list

run '~/.tmux/plugins/tpm/tpm'

