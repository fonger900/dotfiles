########## Shadow Garden ##########
set -g default-terminal "screen-256color"
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g history-limit 100000
set -g escape-time 0

# Colors
set -g status-bg colour234  # #1a1a1a
set -g status-fg colour244  # #777777
# status-style inherits colours above; no extra attributes needed

# Status bar
set -g status-left-length 40
set -g status-left "#[fg=#7aa37a,bold] ❐ #S "
set -g status-right-length 80
set -g status-right "#[fg=#9f84bd] %Y-%m-%d #[fg=#7aa37a]%H:%M #[fg=#d1b56f]#(~/.config/tmux/battery_status.sh) "

# Active window
setw -g window-status-current-style "fg=#9f84bd,bold"
setw -g window-status-current-format "#[fg=#9f84bd,bold]❯ #I:#W#F"

# Inactive windows
setw -g window-status-format "#[fg=#666666] #I:#W#F"

# Pane borders
set -g pane-border-style "fg=#333333"
set -g pane-active-border-style "fg=#7aa37a"

# Prefix key (matches WezTerm leader)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Splits
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

########## DevStack Pro Theme ##########
# Terminal and mouse
set -g default-terminal "screen-256color"
set-option -sa terminal-overrides ",xterm*:Tc"
set -g mouse on

# Session settings
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set -g history-limit 100000
set -g escape-time 0
set -g focus-events on

# Vim-like keybindings
setw -g mode-keys vi
set -g status-keys vi

# Colors - Dark theme with blue/purple accents
set -g status-bg colour235     # #262626 (dark gray)
set -g status-fg colour250     # #bcbcbc (light gray)

# Status bar configuration
set -g status-position top
set -g status-left-length 50
set -g status-right-length 100
set -g status-interval 1

# Left status: session name with dev icon
set -g status-left "#[fg=#61dafb,bg=#282c34,bold] 💻 #S #[fg=#282c34,bg=#3e4451]#[fg=#abb2bf,bg=#3e4451] "

# Right status: git branch, system info, time
set -g status-right "#[fg=#3e4451,bg=#235]#[fg=#abb2bf,bg=#3e4451] #(cd #{pane_current_path}; git branch 2>/dev/null | grep '^*' | cut -d' ' -f2-) #[fg=#98c379]│#[fg=#e06c75] 󰘚 #(tmux display-message -p '#{client_width}x#{client_height}') #[fg=#98c379]│#[fg=#d19a66] 󱑍 #(uptime | cut -d',' -f1 | cut -d' ' -f4-) #[fg=#98c379]│#[fg=#c678dd] 󰥔 %H:%M:%S #[fg=#98c379]│#[fg=#61dafb] 󰸗 %Y-%m-%d "

# Active window styling
setw -g window-status-current-style "fg=#282c34,bg=#61dafb,bold"
setw -g window-status-current-format "#[fg=#235,bg=#61dafb]#[fg=#282c34,bg=#61dafb,bold] #I:#W#{?window_zoomed_flag, 🔍,}#F #[fg=#61dafb,bg=#235]"

# Inactive windows
setw -g window-status-style "fg=#5c6370,bg=#3e4451"
setw -g window-status-format "#[fg=#235,bg=#3e4451]#[fg=#abb2bf,bg=#3e4451] #I:#W#F #[fg=#3e4451,bg=#235]"

# Window activity/bell
setw -g window-status-activity-style "fg=#e06c75,bg=#3e4451,bold"
setw -g window-status-bell-style "fg=#d19a66,bg=#3e4451,bold"

# Pane borders - VS Code inspired
set -g pane-border-style "fg=#3e4451"
set -g pane-active-border-style "fg=#61dafb,bold"

# Copy mode colors
setw -g mode-style "fg=#282c34,bg=#98c379"

# Message styling
set -g message-style "fg=#282c34,bg=#e5c07b,bold"
set -g message-command-style "fg=#282c34,bg=#d19a66,bold"

# Prefix key (Ctrl+Space for dev ergonomics)
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# Window management
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane navigation (Vim-like + Alt)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Window navigation
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Pane resizing
bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5

# Copy mode bindings (Vim-like)
bind v copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle
bind P paste-buffer

# Session management
bind S command-prompt -p "New session name:" "new-session -d -s '%%'"
bind K confirm-before -p "Kill session #S? (y/n)" kill-session

# Development shortcuts
bind-key e new-window -n "editor" "nvim"
bind-key g new-window -n "git" "lazygit"
bind-key t new-window -n "terminal"
bind-key d new-window -n "docker" "lazydocker"

# Quick config reload
bind r source-file ~/.tmux.conf \; display-message " 🚀 DevStack config reloaded!"

# Floating window (popup) for quick tasks
bind-key f display-popup -E -w 80% -h 80%
bind-key F display-popup -E -w 90% -h 90% -d "#{pane_current_path}"

# Clear screen and history
bind-key C-l send-keys C-l \; clear-history

# Toggle synchronize panes
bind-key s set-window-option synchronize-panes \; display-message "Synchronize panes: #{?synchronize-panes,ON,OFF}"

# Plugin manager setup (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Plugin configurations
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-boot 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
