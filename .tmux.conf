### Basics ###
set -g mouse on
set -g history-limit 10000
set -g base-index 1
set -g prefix C-a
unbind C-b
bind C-a send-prefix

### Pane Settings ###
setw -g mode-keys vi
setw -g pane-base-index 1

# Pane Navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Split Panes
bind v split-window -h
bind s split-window -v

# Resize Panes
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3

# Kill + Session
bind x kill-pane
bind q kill-session
bind-key C-n new-session -A -s hermit

### Status Bar ###
set -g status on
set -g status-interval 2
set -g status-justify centre
set -g status-left-length 30
set -g status-right-length 150
set -g status-style bg=#002b36,fg=#93a1a1

# Left: [session] [window index:name]
set -g status-left "#[fg=#859900,bold] #S #[fg=#586e75] #[fg=#93a1a1]#I:#W "

# Right: battery + time + host
set -g status-right "#(pmset -g batt | grep -Eo '[0-9]+%' | head -1) #[fg=#586e75] %Y-%m-%d %H:%M #[fg=#586e75] #[fg=#93a1a1]#(hostname)"

# Middle window style
setw -g window-status-format " #[fg=#586e75]#I:#W "
setw -g window-status-current-format " #[fg=#cb4b16][#I:#W] "
