########## Shadow Garden ##########
set -g default-terminal "screen-256color"
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g history-limit 100000
set -g escape-time 0

# Colors
set -g status-bg colour234  # #1a1a1a
set -g status-fg colour244  # #777777
# status-style inherits colours above; no extra attributes needed

# Status bar
set -g status-left-length 40
set -g status-left "#[fg=#7aa37a,bold] ❐ #S "
set -g status-right-length 80
set -g status-right "#[fg=#9f84bd] %Y-%m-%d #[fg=#7aa37a]%H:%M #[fg=#d1b56f]#(~/.config/tmux/battery_status.sh) "

# Active window
setw -g window-status-current-style "fg=#9f84bd,bold"
setw -g window-status-current-format "#[fg=#9f84bd,bold]❯ #I:#W"

# Inactive windows
setw -g window-status-format "#[fg=#666666] #I:#W"

# Pane borders
set -g pane-border-style "fg=#333333"
set -g pane-active-border-style "fg=#7aa37a"

# Prefix key (matches WezTerm leader)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Splits
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display "🌱 Shadow Garden reloaded"
