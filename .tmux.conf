# ==========================================
# Simplified Tmux Configuration
# Author: fonger
# Updated: 2025-11-22
# ==========================================

# ==========================================
# Plugin Manager (TPM)
# ==========================================
# Install TPM: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'catppuccin/tmux'

# ==========================================
# General Settings
# ==========================================
# Enable 256 color support and true color
set -g default-terminal "screen-256color"
set-option -sa terminal-overrides ",xterm*:Tc"

# Enable mouse support
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set-option -g renumber-windows on

# Increase scrollback buffer size
set -g history-limit 10000

# Faster command sequences
set -g escape-time 0

# Focus events for vim/neovim autoread
set -g focus-events on

# ==========================================
# Prefix Key Configuration
# ==========================================
# Change prefix from Ctrl+b to Ctrl+a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Quick reload of config file
bind r source-file ~/.tmux.conf \; display-message "🚀 Tmux config reloaded!"

# ==========================================
# Window & Pane Management
# ==========================================
# Split panes
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window
bind c new-window -c "#{pane_current_path}"

# Kill pane/window
bind x kill-pane
bind X kill-window

# Switch windows
bind -r p previous-window
bind -r n next-window


# ==========================================
# Pane Navigation (Vim-style)
# ==========================================
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ==========================================
# Pane Resizing
# ==========================================
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Zoom pane
bind z resize-pane -Z

# ==========================================
# Copy Mode (Vim-style)
# ==========================================
# Enter copy mode
bind Enter copy-mode

# Vi-style key bindings in copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# Paste from clipboard
bind P paste-buffer

# ==========================================
# Status Bar Configuration
# ==========================================
set -g status on
set -g status-position bottom

# Catppuccin theme configuration
set -g @catppuccin_flavour 'mocha'
set -g @catppuccin_window_text "#W"

# ==========================================
# Session Management
# ==========================================
# Session navigation
bind s choose-session

# Detach from session
bind d detach-client

# ==========================================
# Plugin Configurations
# ==========================================
# tmux-resurrect: Save and restore sessions
set -g @resurrect-capture-pane-contents 'on'
# Manual save/restore bindings
set -g @resurrect-save 'C-s'
set -g @resurrect-restore 'C-r'

# ==========================================
# Tmux Plugin Manager - KEEP AT BOTTOM
# ==========================================
run '~/.tmux/plugins/tpm/tpm'

