
# ────────────────────────────────────────────────────────────────
#  Starship Prompt – Shadow Gardener "Cyber‑Silent" (v2)
#  • Đường nét neon gọn, chỉ hiện tối thiểu: thư mục · branch · thời gian lệnh
#  • Không phô trương nhưng vẫn có sắc thái cyberpunk (#89b4fa, #cba6f7…)
# ────────────────────────────────────────────────────────────────

format = "\n[▌](fg:#89b4fa)\uE0B0 $directory$git_branch$cmd_duration$line_break$character"
add_newline = true

# ───── DIRECTORY ───────────────────────────────────────────────
[directory]
style               = "fg:#cdd6f4"
truncation_length   = 3          # ~/g/t/dotfiles
truncate_to_repo    = false
format              = "[ $path ]($style)"

# ───── GIT BRANCH ───────────────────────────────────────────────
[git_branch]
format              = "[ $branch](fg:#cba6f7)"
truncation_length   = 20
only_attached       = true

# ───── COMMAND DURATION ─────────────────────────────────────────
[cmd_duration]
min_time            = 2000       # hiện khi >2 s
format              = " [⧖ $duration](fg:#a6e3a1)"

# ───── CHARACTER ───────────────────────────────────────────────
[character]
success_symbol      = "[❯](fg:#a6e3a1 bold)"
error_symbol        = "[✗](fg:#f38ba8 bold)"
vicmd_symbol        = "[❮](fg:#cba6f7 bold)"

# ───── DISABLED MODULES ────────────────────────────────────────
[git_status]
disabled = true
[hostname]
disabled = true
[username]
disabled = true
[time]
disabled = true
[shell]
disabled = true

# ───── OPTIONAL EXTRAS (bật nếu muốn) ──────────────────────────
# [battery]
# disabled = false
# full_symbol   = "🔋"
# charging_symbol = "⚡"
# discharging_symbol = ""
# ────────────────────────────────────────────────────────────────
