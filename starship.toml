# Shadow Garden Starship Theme
add_newline = false
format = "$all"

[character]
success_symbol = "[❯](#7aa37a)"
error_symbol = "[✗](#d1b56f)"

[directory]
truncation_length = 3
style = "bold fg:#9f84bd"
read_only = "  "

[git_branch]
style = "fg:#7aa37a"

[git_status]
style = "fg:#d1b56f"

[time]
disabled = false
format = "[$time](#666666) "

[cmd_duration]
min_time = 2000
format = "[ took $duration ](#666666) "

[username]
disabled = true

[hostname]
disabled = true

[battery]
disabled = false
full_symbol   = "🌿"
charging_symbol = "⚡"
discharging_symbol = "🔋"
