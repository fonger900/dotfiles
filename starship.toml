# ============================================================================
# Starship Configuration - Minimal & Clean
# ============================================================================
# Fast, distraction-free prompt for fullstack development

# Main format - Clean and simple
format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$rust\
$golang\
$docker_context\
$cmd_duration\
$line_break\
$character """

add_newline = false

# ============================================================================
# Directory
# ============================================================================

[directory]
truncation_length = 2
truncate_to_repo = true
format = "[$path]($style) "
style = "bold 33"
read_only = " "
read_only_style = "red"
truncation_symbol = "…/"
home_symbol = "~"

[directory.substitutions]
"Documents" = " "
"Downloads" = " "
"Desktop" = " "
"Projects" = " "
"src" = " "
"lib" = " "
"config" = " "
"node_modules" = " "

# ============================================================================
# Git
# ============================================================================

[git_branch]
symbol = ""
format = "[$symbol$branch]($style) "
style = "bold magenta"
disabled = false

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold yellow"
disabled = false
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

# ============================================================================
# Languages
# ============================================================================

[nodejs]
symbol = ""
format = "[$symbol($version)]($style) "
style = "green"
detect_extensions = ["js", "mjs", "cjs", "ts"]
detect_files = ["package.json"]
detect_folders = ["node_modules"]

[python]
symbol = ""
format = "[$symbol($version)]($style) "
style = "yellow"
detect_extensions = ["py"]
detect_files = ["pyproject.toml", "requirements.txt", "Pipfile"]

[rust]
symbol = ""
format = "[$symbol($version)]($style) "
style = "bold red"
detect_extensions = ["rs"]
detect_files = ["Cargo.toml"]

[golang]
symbol = ""
format = "[$symbol($version)]($style) "
style = "bold cyan"
detect_extensions = ["go"]
detect_files = ["go.mod"]

[docker_context]
symbol = "🐳"
format = "[$symbol($context)]($style) "
style = "blue"
disabled = false
detect_files = ["docker-compose.yml", "Dockerfile"]

# ============================================================================
# Execution Time
# ============================================================================

[cmd_duration]
min_time = 1000
format = "[$duration]($style) "
style = "bold yellow"
show_milliseconds = false
disabled = false

# ============================================================================
# Character / Exit Status
# ============================================================================

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"
