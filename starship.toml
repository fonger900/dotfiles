# ────────────────────────────────────────────────────────────────
#  Starship Prompt – Shadow Gardener "Cyber‑Silent" (v3)
#  • Vạch neon ▌ + thư mục nổi bật (vàng), branch, thời gian lệnh.
#  • Thư mục hiển thị icon ‘’ và tô đậm để dễ nhận.
# ────────────────────────────────────────────────────────────────

format = "[▌](fg:#89b4fa)$directory$git_branch$cmd_duration$line_break$character"
add_newline = true

# ───── DIRECTORY – nổi bật vàng ────────────────────────────────
[directory]
style               = "fg:#f9e2af bg:#1e1e2e bold"
truncation_length   = 3
truncate_to_repo    = false
format              = "[   $path ]($style)"

# ───── GIT BRANCH ───────────────────────────────────────────────
[git_branch]
format              = "[ $branch](fg:#cba6f7)"
truncation_length   = 20
only_attached       = true

# ───── COMMAND DURATION ─────────────────────────────────────────
[cmd_duration]
min_time            = 2000
format              = " [⧖ $duration](fg:#a6e3a1)"

# ───── CHARACTER ───────────────────────────────────────────────
[character]
success_symbol      = "[❯](fg:#a6e3a1 bold)"
error_symbol        = "[✗](fg:#f38ba8 bold)"
vicmd_symbol        = "[❮](fg:#cba6f7 bold)"

# ───── DISABLED MODULES ────────────────────────────────────────
[git_status]
disabled = true
[hostname]
disabled = true
[username]
disabled = true
[time]
disabled = true
[shell]
disabled = true

# ───── OPTIONAL EXTRAS (pin, battery…) ─────────────────────────
# [battery]
# full_symbol   = "🔋"
# discharging_symbol = ""
# charging_symbol = "⚡"
# ────────────────────────────────────────────────────────────────
