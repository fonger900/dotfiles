---
- name: Fullstack Dev Dotfiles Setup
  hosts: localhost
  connection: local
  gather_facts: true
  
  vars:
    dotfiles_dir: "{{ playbook_dir }}/.."
    stow_packages:
      - zsh
      - tmux
      - nvim
      - ghostty
      - starship
      - ripgrep
      - newsboat
      - helix
      - fastfetch
      - sway
      - waybar
      - fontconfig
      - gestures
      - gtk
      - bat
      - wofi
      - swaylock
      - wezterm
      - pipewire
      - zathura
      - redshift
      - mako
      - systemd
    
    # Custom plugin directories
    zsh_custom: "{{ ansible_env.HOME }}/.oh-my-zsh/custom"
  
  tasks:
    - name: Ensure dotfiles_dir is absolute
      ansible.builtin.set_fact:
        dotfiles_dir: "{{ dotfiles_dir | expanduser | realpath }}"

    - name: Include system packages tasks
      ansible.builtin.include_tasks: tasks/system.yml
      tags: ['system', 'packages']

    - name: Include runtimes tasks
      ansible.builtin.include_tasks: tasks/runtimes.yml
      tags: ['runtimes']

    - name: Include dotfiles tasks (Stow)
      ansible.builtin.include_tasks: tasks/dotfiles.yml
      tags: ['dotfiles', 'stow']

    - name: Include terminal setup tasks
      ansible.builtin.include_tasks: tasks/terminal_setup.yml
      tags: ['terminal', 'zsh', 'tmux']

    - name: Include fonts tasks
      ansible.builtin.include_tasks: tasks/fonts.yml
      tags: ['fonts']

    - name: Include gestures tasks
      ansible.builtin.include_tasks: tasks/gestures.yml
      tags: ['gestures']

    - name: Include power management tasks
      ansible.builtin.include_tasks: tasks/power.yml
      tags: ['power']

    - name: Include flatpak tasks
      ansible.builtin.include_tasks: tasks/flatpak.yml
      tags: ['flatpak']

    - name: Systemd | Enable user timers
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
        state: started
        scope: user
      loop:
        - dynamic-wallpaper.timer
      tags: ['systemd', 'dotfiles']

    - name: Bluetooth | Disable auto-off script (handled natively)
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/.local/bin/bt_auto_off.sh"
        state: absent
      ignore_errors: true
      tags: ['bluetooth']

  handlers:
    - name: Restart TLP
      ansible.builtin.systemd:
        name: tlp
        state: restarted
      become: true

    - name: Update GRUB
      ansible.builtin.command: update-grub
      become: true

    - name: Restart logind
      ansible.builtin.systemd:
        name: systemd-logind
        state: restarted
      become: true
