---
- name: Fullstack Dev Dotfiles Setup
  hosts: localhost
  connection: local
  gather_facts: true
  
  vars:
    dotfiles_dir: "{{ playbook_dir }}/.."
    stow_packages:
      - zsh
      - tmux
      - nvim
      - wezterm
      - ghostty
      - starship
      - ripgrep
      - newsboat
      - helix
      - fastfetch
    
    # Custom plugin directories
    zsh_custom: "{{ ansible_env.HOME }}/.oh-my-zsh/custom"
  
  tasks:
    - name: Ensure dotfiles_dir is absolute
      ansible.builtin.set_fact:
        dotfiles_dir: "{{ dotfiles_dir | expanduser | realpath }}"

    - name: Include system packages tasks
      ansible.builtin.include_tasks: tasks/system.yml
      tags: ['system', 'packages']

    - name: Include runtimes tasks
      ansible.builtin.include_tasks: tasks/runtimes.yml
      tags: ['runtimes']

    - name: Include dotfiles tasks (Stow)
      ansible.builtin.include_tasks: tasks/dotfiles.yml
      tags: ['dotfiles', 'stow']

    - name: Include terminal setup tasks
      ansible.builtin.include_tasks: tasks/terminal_setup.yml
      tags: ['terminal', 'zsh', 'tmux']
