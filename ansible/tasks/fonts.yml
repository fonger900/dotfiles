---
- name: Fonts | Check if JetBrains Mono Nerd Font is installed
  ansible.builtin.shell: fc-list | grep -i "JetBrainsMonoNerdFont"
  register: font_check
  failed_when: false
  changed_when: false

- name: Fonts | Create local fonts directory
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.local/share/fonts"
    state: directory
    mode: '0755'

- name: Fonts | Install JetBrains Mono Nerd Font
  block:
    - name: Fonts | Create temporary directory for font download
      ansible.builtin.tempfile:
        state: directory
        suffix: fonts
      register: font_tmp

    - name: Fonts | Download JetBrains Mono Nerd Font
      ansible.builtin.get_url:
        url: "https://github.com/ryanoasis/nerd-fonts/releases/download/v3.2.1/JetBrainsMono.zip"
        dest: "{{ font_tmp.path }}/JetBrainsMono.zip"
        mode: '0644'

    - name: Fonts | Unzip JetBrains Mono Nerd Font
      ansible.builtin.unarchive:
        src: "{{ font_tmp.path }}/JetBrainsMono.zip"
        dest: "{{ font_tmp.path }}"
        remote_src: yes

    - name: Fonts | Copy font files to local fonts directory
      ansible.builtin.shell: |
        find {{ font_tmp.path }} -name "*Nerd Font*.ttf" -exec cp {} {{ ansible_env.HOME }}/.local/share/fonts/ \;
      args:
        executable: /bin/bash

    - name: Fonts | Update font cache
      ansible.builtin.command: fc-cache -fv
      changed_when: true

    - name: Fonts | Cleanup temporary directory
      ansible.builtin.file:
        path: "{{ font_tmp.path }}"
        state: absent
  when: font_check.rc != 0
