---
- name: Power | Gather service facts
  ansible.builtin.service_facts:

- name: Power | Ensure TLP service is enabled
  ansible.builtin.systemd:
    name: tlp
    enabled: yes
    state: started
  become: true

- name: Power | Ensure TLP configuration directory exists
  ansible.builtin.file:
    path: /etc/tlp.d
    state: directory
    mode: '0755'
  become: true

- name: Power | Configure TLP for ThinkPad T14 Gen 1 AMD
  ansible.builtin.copy:
    dest: /etc/tlp.d/99-thinkpad-t14.conf
    mode: '0644'
    content: |
      # TLP config — ThinkPad T14 Gen 1 AMD (Ryzen 4650U / Renoir)

      # ── Battery health ───────────────────────────────────────────
      START_CHARGE_THRESH_BAT0=75
      STOP_CHARGE_THRESH_BAT0=80

      # ── CPU ──────────────────────────────────────────────────────
      CPU_SCALING_GOVERNOR_ON_AC=schedutil
      CPU_SCALING_GOVERNOR_ON_BAT=schedutil
      CPU_ENERGY_PERF_POLICY_ON_AC=balance_performance
      CPU_ENERGY_PERF_POLICY_ON_BAT=power
      CPU_BOOST_ON_AC=1
      CPU_BOOST_ON_BAT=0
      CPU_HWP_DYN_BOOST_ON_AC=1
      CPU_HWP_DYN_BOOST_ON_BAT=0

      # ── Platform profile (AMD) ───────────────────────────────────
      PLATFORM_PROFILE_ON_AC=balanced
      PLATFORM_PROFILE_ON_BAT=low-power

      # ── GPU (Renoir iGPU) ────────────────────────────────────────
      RADEON_DPM_PERF_LEVEL_ON_AC=auto
      RADEON_DPM_PERF_LEVEL_ON_BAT=low

      # ── PCIe / ASPM ─────────────────────────────────────────────
      PCIE_ASPM_ON_AC=default
      PCIE_ASPM_ON_BAT=powersupersave

      # ── WiFi ─────────────────────────────────────────────────────
      WIFI_PWR_ON_AC=off
      WIFI_PWR_ON_BAT=on

      # ── Audio ────────────────────────────────────────────────────
      SOUND_POWER_SAVE_ON_AC=0
      SOUND_POWER_SAVE_ON_BAT=1
      SOUND_POWER_SAVE_CONTROLLER=Y

      # ── USB autosuspend ──────────────────────────────────────────
      USB_AUTOSUSPEND=1
      USB_EXCLUDE_BTUSB=1

      # ── Runtime PM ───────────────────────────────────────────────
      RUNTIME_PM_ON_AC=on
      RUNTIME_PM_ON_BAT=auto
  become: true
  notify: Restart TLP

- name: Power | Disable thermald (conflicts with AMD P-state on Ryzen)
  ansible.builtin.systemd:
    name: thermald
    enabled: false
    state: stopped
  become: true
  ignore_errors: true
  when: ansible_facts.services['thermald.service'] is defined

- name: Power | Kernel params — AMD P-state + S3 deep sleep + NVMe fix
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: '^GRUB_CMDLINE_LINUX_DEFAULT='
    line: 'GRUB_CMDLINE_LINUX_DEFAULT="quiet splash amd_pstate=active nvme.noacpi=1 mem_sleep_default=deep"'
    backup: yes
  become: true
  notify: Update GRUB

- name: Power | Ensure logind configuration directory exists
  ansible.builtin.file:
    path: /etc/systemd/logind.conf.d
    state: directory
    mode: '0755'
  become: true

- name: Power | Configure logind — let swayidle handle lid, not logind
  ansible.builtin.copy:
    dest: /etc/systemd/logind.conf.d/99-sway.conf
    mode: '0644'
    content: |
      [Login]
      # Sway + swayidle handle lock/suspend on lid close
      # logind only triggers suspend signal; swayidle's 'lock' event handles the rest
      HandleLidSwitch=suspend
      HandleLidSwitchExternalPower=lock
      HandleLidSwitchDocked=ignore
      HandlePowerKey=ignore
      # Prevent logind from managing idle — swayidle does this
      IdleAction=ignore
      LidSwitchIgnoreInhibited=no
  become: true
  notify: Restart logind

- name: Power | AMD GPU power profile udev rule
  ansible.builtin.copy:
    dest: /etc/udev/rules.d/91-amdgpu-power.rules
    mode: '0644'
    content: |
      ACTION=="change", SUBSYSTEM=="power_supply", ATTR{online}=="1", \
        RUN+="/bin/sh -c 'echo auto > /sys/class/drm/card0/device/power_dpm_force_performance_level'"
      ACTION=="change", SUBSYSTEM=="power_supply", ATTR{online}=="0", \
        RUN+="/bin/sh -c 'echo low > /sys/class/drm/card0/device/power_dpm_force_performance_level'"
  become: true
