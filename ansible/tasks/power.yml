---
- name: Power | Ensure TLP service is enabled
  ansible.builtin.systemd:
    name: tlp
    enabled: yes
    state: started
  become: true

- name: Power | Configure TLP for ThinkPad T14 AMD
  ansible.builtin.copy:
    content: |
      # 🔋 TLP Optimized Config for ThinkPad T14 AMD
      
      # Battery charge thresholds (Preserve battery health)
      # Charging starts at 75% and stops at 80%
      START_CHARGE_THRESH_BAT0=75
      STOP_CHARGE_THRESH_BAT0=80
      
      # CPU Performance scaling
      CPU_SCALING_GOVERNOR_ON_AC=performance
      CPU_SCALING_GOVERNOR_ON_BAT=powersave
      
      # CPU Energy/Performance Policy
      CPU_ENERGY_PERF_POLICY_ON_AC=performance
      CPU_ENERGY_PERF_POLICY_ON_BAT=power
      
      # Platform Profile (AMD specific)
      PLATFORM_PROFILE_ON_AC=performance
      PLATFORM_PROFILE_ON_BAT=low-power
      
      # Wifi power saving
      WIFI_PWR_ON_AC=off
      WIFI_PWR_ON_BAT=on
      
      # Audio power saving
      SOUND_POWER_SAVE_ON_AC=0
      SOUND_POWER_SAVE_ON_BAT=1
    dest: /etc/tlp.d/99-thinkpad-t14.conf
    mode: '0644'
  become: true
  notify: Restart TLP

- name: Power | Ensure thermald is enabled (Prevent overheating)
  ansible.builtin.systemd:
    name: thermald
    enabled: yes
    state: started
  become: true
