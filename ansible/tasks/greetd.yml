---
- name: Greetd | Ensure greeter system user exists
  ansible.builtin.user:
    name: greeter
    system: true
    shell: /sbin/nologin
    home: /var/lib/greeter
    create_home: false
    comment: "greetd greeter user"
  become: true

- name: Greetd | Ensure greeter home directory exists
  ansible.builtin.file:
    path: /var/lib/greeter
    state: directory
    owner: greeter
    group: greeter
    mode: '0755'
  become: true

- name: Greetd | Check if tuigreet is installed
  ansible.builtin.stat:
    path: /usr/local/bin/tuigreet
  register: tuigreet_bin

- name: Greetd | Get latest tuigreet release info
  ansible.builtin.uri:
    url: https://api.github.com/repos/apognu/tuigreet/releases/latest
    return_content: true
  register: tuigreet_release
  when: not tuigreet_bin.stat.exists

- name: Greetd | Download tuigreet binary
  ansible.builtin.get_url:
    url: "{{ tuigreet_release.json.assets | selectattr('name', 'equalto', 'tuigreet-' + tuigreet_release.json.tag_name | regex_replace('^v','') + '-x86_64') | map(attribute='browser_download_url') | first }}"
    dest: /usr/local/bin/tuigreet
    mode: '0755'
    owner: root
    group: root
  become: true
  when: not tuigreet_bin.stat.exists

- name: Greetd | Deploy config
  ansible.builtin.copy:
    src: "{{ dotfiles_dir }}/greetd/.config/greetd/config.toml"
    dest: /etc/greetd/config.toml
    owner: root
    group: root
    mode: '0644'
  become: true
  notify: Restart greetd

- name: Greetd | Disable other display managers
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: false
    state: stopped
  become: true
  ignore_errors: true
  loop:
    - gdm
    - gdm3
    - lightdm
    - sddm

- name: Greetd | Enable and start greetd
  ansible.builtin.systemd:
    name: greetd
    enabled: true
    state: started
  become: true
