---
# Stow dotfiles for Linux Mint 22 XFCE.
# Sway/Wayland-specific packages (sway, waybar, wofi, swaylock, gestures, gtk)
# are intentionally excluded — they are not relevant on XFCE/X11.

- name: Dotfiles | Check for existing .zshrc
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.zshrc"
  register: zshrc_stat

- name: Dotfiles | Backup existing .zshrc if it is not a symlink
  ansible.builtin.command: mv "{{ ansible_env.HOME }}/.zshrc" "{{ ansible_env.HOME }}/.zshrc.bak"
  when: zshrc_stat.stat.exists and not zshrc_stat.stat.islnk

- name: Dotfiles | Check for existing fontconfig config
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.config/fontconfig/fonts.conf"
  register: fontconfig_stat

- name: Dotfiles | Backup existing fontconfig config if it is not a symlink
  ansible.builtin.command: mv "{{ ansible_env.HOME }}/.config/fontconfig/fonts.conf" "{{ ansible_env.HOME }}/.config/fontconfig/fonts.conf.bak"
  when: fontconfig_stat.stat.exists and not fontconfig_stat.stat.islnk

- name: Dotfiles | Stow packages
  ansible.builtin.command: stow -v -R -t "{{ ansible_env.HOME }}" -d "{{ dotfiles_dir }}" {{ item }}
  args:
    chdir: "{{ dotfiles_dir }}"
  loop: "{{ stow_packages }}"
  register: stow_res
  changed_when: >
    'LINK: ' in stow_res.stderr or
    'UNLINK: ' in stow_res.stderr or
    'MKDIR: ' in stow_res.stderr or
    'RMDIR: ' in stow_res.stderr
