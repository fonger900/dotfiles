---
- name: Core | Install basic dependencies (macOS)
  community.general.homebrew:
    name:
      - curl
      - git
      - stow
      - zsh
      - fd
      - ripgrep
      - eza
      - fzf
      - bat
      - ca-certificates
      - font-inter
    state: present
    update_homebrew: true
  when: ansible_facts['os_family'] == 'Darwin'


- name: Core | Ensure APT cache is updated
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
  become: true
  when: ansible_facts['os_family'] == 'Debian'


- name: Core | Install basic dependencies (Debian/Ubuntu)
  ansible.builtin.apt:
    update_cache: yes
    name:
      # Base tools
      - curl
      - git
      - stow
      - zsh
      - fd-find
      - ripgrep
      - eza
      - fzf
      - bat
      - ca-certificates
      - build-essential
      - unzip
      - gettext
      # Fonts
      - fonts-inter
      - fonts-noto-cjk
      - fonts-noto-cjk-extra
      - fontconfig
      # Input method
      - fcitx5
      - fcitx5-unikey
      - fcitx5-config-qt
      # Sway & Wayland core
      - sway
      - waybar
      - swayidle
      - swaylock
      - wofi
      - wl-clipboard
      - xwayland
      - wayland-protocols
      - xdg-desktop-portal-wlr
      - xdg-desktop-portal-gtk
      - dbus-user-session
      # Terminal & shell
      - tmux
      - ncurses-term
      # Media & audio
      - pipewire
      - pipewire-pulse
      - wireplumber
      - playerctl
      - pavucontrol
      - pulseaudio-utils
      # Hardware
      - brightnessctl
      - libinput-tools
      - bluez
      - bluez-tools
      - upower
      # Screenshots & notifications
      - grim
      - slurp
      - libnotify-bin
      # Files & apps
      - thunar
      # Power management
      - tlp
      - tlp-rdw
      - thermald
      # Theming
      - papirus-icon-theme
      - adwaita-icon-theme-full
      - nwg-look
      - qt5ct
      - qt6ct
      - libgdk-pixbuf2.0-bin
      - librsvg2-common
      - shared-mime-info
      # Hardware acceleration (AMD Renoir / Radeon Vega)
      - mesa-va-drivers
      - mesa-vdpau-drivers
      - libva-utils
      # Flatpak
      - flatpak
    state: present
  become: true
  when: ansible_facts['os_family'] == 'Debian'


- name: Core | Ensure user is in necessary groups (Debian)
  ansible.builtin.user:
    name: "{{ lookup('env', 'USER') }}"
    groups: input,video,render
    append: yes
  become: true
  when: ansible_facts['os_family'] == 'Debian'

- name: Core | Check for fdfind binary
  ansible.builtin.stat:
    path: /usr/bin/fdfind
  register: fdfind_bin
  when: ansible_facts['os_family'] == 'Debian'

- name: Core | Ensure fd is symlinked on Debian/Ubuntu
  ansible.builtin.file:
    src: /usr/bin/fdfind
    dest: /usr/local/bin/fd
    state: link
  become: true
  when: 
    - ansible_facts['os_family'] == 'Debian'
    - fdfind_bin.stat.exists

- name: Core | Install basic dependencies (Arch Linux)
  community.general.pacman:
    name:
      - curl
      - git
      - stow
      - zsh
      - fd
      - ripgrep
      - eza
      - fzf
      - bat
      - ca-certificates
      - base-devel
      - unzip
      - gettext
    state: present
    update_cache: true
  become: true
  when: ansible_facts['os_family'] == 'Archlinux'

- name: Core | Check for batcat binary on Debian
  ansible.builtin.stat:
    path: /usr/bin/batcat
  register: batcat_bin
  when: ansible_facts['os_family'] == 'Debian'

- name: Core | Ensure bat is symlinked on Debian/Ubuntu
  ansible.builtin.file:
    src: /usr/bin/batcat
    dest: /usr/local/bin/bat
    state: link
  become: true
  when: 
    - ansible_facts['os_family'] == 'Debian'
    - batcat_bin.stat.exists

- name: Core | Install basic dependencies (RedHat/Fedora)
  ansible.builtin.dnf:
    name:
      - curl
      - git
      - stow
      - zsh
      - fd-find
      - ripgrep
      - eza
      - fzf
      - bat
      - ca-certificates
      - gcc
      - make
      - unzip
      - gettext
    state: present
    update_cache: true
  become: true
  when: ansible_facts['os_family'] == 'RedHat'
