---
- name: Core | Install basic dependencies (macOS)
  community.general.homebrew:
    name:
      - curl
      - git
      - stow
      - zsh
      - fd
      - ripgrep
      - ca-certificates
    state: present
    update_homebrew: true
  when: ansible_facts['os_family'] == 'Darwin'

- name: Core | Ensure APT cache is updated
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
  become: true
  when: ansible_facts['os_family'] == 'Debian'

- name: Core | Add WezTerm GPG key (Debian)
  ansible.builtin.get_url:
    url: https://apt.fury.io/wez/gpg.key
    dest: /usr/share/keyrings/wezterm-fury.gpg
    mode: '0644'
  become: true
  when: ansible_facts['os_family'] == 'Debian'

- name: Core | Add WezTerm Repository (Debian)
  ansible.builtin.copy:
    content: "deb [signed-by=/usr/share/keyrings/wezterm-fury.gpg] https://apt.fury.io/wez/ * *"
    dest: /etc/apt/sources.list.d/wezterm.list
    mode: '0644'
  become: true
  when: ansible_facts['os_family'] == 'Debian'

- name: Core | Install basic dependencies (Debian/Ubuntu)
  ansible.builtin.apt:
    update_cache: yes
    name:
      - curl
      - git
      - stow
      - zsh
      - fd-find
      - ripgrep
      - ca-certificates
      - build-essential
      - unzip
      - gettext
      - pulseaudio-utils
      - sway
      - wezterm
      - foot
      - wofi
      - waybar
      - swayidle
      - swaylock
      - grim
      - slurp
      - playerctl
      - brightnessctl
      - pavucontrol
      - gnome-keyring
      - dbus-x11
      - libgdk-pixbuf2.0-bin
      - librsvg2-common
      - shared-mime-info
      - fontconfig
    state: present
  become: true
  when: ansible_facts['os_family'] == 'Debian'


- name: Core | Ensure user is in input group for brightnessctl LED control (Debian)
  ansible.builtin.user:
    name: "{{ lookup('env', 'USER') }}"
    groups: input
    append: yes
  become: true
  when: ansible_facts['os_family'] == 'Debian'

- name: Core | Check for fdfind binary
  ansible.builtin.stat:
    path: /usr/bin/fdfind
  register: fdfind_bin
  when: ansible_facts['os_family'] == 'Debian'

- name: Core | Ensure fd is symlinked on Debian/Ubuntu
  ansible.builtin.file:
    src: /usr/bin/fdfind
    dest: /usr/local/bin/fd
    state: link
  become: true
  when: 
    - ansible_facts['os_family'] == 'Debian'
    - fdfind_bin.stat.exists

- name: Core | Install basic dependencies (Arch Linux)
  community.general.pacman:
    name:
      - curl
      - git
      - stow
      - zsh
      - fd
      - ripgrep
      - ca-certificates
      - base-devel
      - unzip
      - gettext
    state: present
    update_cache: true
  become: true
  when: ansible_facts['os_family'] == 'Archlinux'

- name: Core | Install basic dependencies (RedHat/Fedora)
  ansible.builtin.dnf:
    name:
      - curl
      - git
      - stow
      - zsh
      - fd-find
      - ripgrep
      - ca-certificates
      - gcc
      - make
      - unzip
      - gettext
    state: present
    update_cache: true
  become: true
  when: ansible_facts['os_family'] == 'RedHat'
