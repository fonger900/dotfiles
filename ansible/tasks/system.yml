---
- name: Core | Install basic dependencies (macOS)
  community.general.homebrew:
    name:
      - curl
      - git
      - stow
      - zsh
      - fd
      - ripgrep
      - eza
      - fzf
      - bat
      - ca-certificates
      - font-inter
      - zathura
      - zathura-pdf-mupdf
    state: present
    update_homebrew: true
  when: ansible_facts['os_family'] == 'Darwin'


- name: Core | Ensure APT cache is updated
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
  become: true
  when: ansible_facts['os_family'] == 'Debian'

- name: Core | Set system timezone
  community.general.timezone:
    name: Asia/Ho_Chi_Minh
  become: true
  when: ansible_facts['os_family'] in ['Debian', 'Archlinux', 'RedHat']


- name: Core | Install basic dependencies (Debian/Ubuntu)
  ansible.builtin.apt:
    update_cache: yes
    name:
      # Base tools
      - curl
      - git
      - stow
      - zsh
      - fd-find
      - ripgrep
      - eza
      - fzf
      - bat
      - ca-certificates
      - build-essential
      - unzip
      - gettext
      # Fonts
      - fonts-inter
      - fonts-noto-cjk
      - fonts-noto-cjk-extra
      - fontconfig
      # Input method
      - fcitx5
      - fcitx5-unikey
      - fcitx5-config-qt
      # Sway & Wayland core
      - sway
      - waybar
      - swayidle
      - swaylock
      - wofi
      - fuzzel
      - wl-clipboard
      - xwayland
      - wayland-protocols
      - xdg-desktop-portal-wlr
      - xdg-desktop-portal-gtk
      - dbus-user-session
      - fastfetch
      # Terminal & shell
      - tmux
      - ncurses-term
      # Media & audio
      - pipewire
      - pipewire-pulse
      - wireplumber
      - playerctl
      - pavucontrol
      # Hardware
      - brightnessctl
      - libinput-tools
      - bluez
      - blueman
      - libspa-0.2-bluetooth
      - upower
      - gammastep
      - gamemode
      # Screenshots & notifications
      - grim
      - slurp
      - mako-notifier
      - libnotify-bin
      # Files & apps
      - thunar
      - zathura
      - zathura-pdf-poppler
      # Power management
      - tlp
      - tlp-rdw
      # Theming
      - papirus-icon-theme
      - libgdk-pixbuf2.0-bin
      - librsvg2-common
      - shared-mime-info
      - mesa-va-drivers
      - mesa-vdpau-drivers
      - vainfo
      # Image processing
      - imagemagick
      # Secret Service & Backup
      - keepassxc
      - timeshift
      # Login manager
      - greetd
      - tuigreet
      # Flatpak
      - flatpak
    state: present
  become: true
  when: ansible_facts['os_family'] == 'Debian'


- name: Core | Ensure user is in necessary groups (Debian)
  ansible.builtin.user:
    name: "{{ lookup('env', 'USER') }}"
    groups: input,video,render
    append: yes
  become: true
  when: ansible_facts['os_family'] == 'Debian'

- name: Core | Check for fdfind binary
  ansible.builtin.stat:
    path: /usr/bin/fdfind
  register: fdfind_bin
  when: ansible_facts['os_family'] == 'Debian'

- name: Core | Ensure fd is symlinked on Debian/Ubuntu
  ansible.builtin.file:
    src: /usr/bin/fdfind
    dest: /usr/local/bin/fd
    state: link
  become: true
  when: 
    - ansible_facts['os_family'] == 'Debian'
    - fdfind_bin.stat.exists

- name: Core | Install basic dependencies (Arch Linux)
  community.general.pacman:
    name:
      - curl
      - git
      - stow
      - zsh
      - fd
      - ripgrep
      - eza
      - fzf
      - bat
      - ca-certificates
      - base-devel
      - unzip
      - gettext
      - fastfetch
      - zathura
      - zathura-pdf-mupdf
      - gammastep
      - gamemode
    state: present
    update_cache: true
  become: true
  when: ansible_facts['os_family'] == 'Archlinux'

- name: Core | Check for batcat binary on Debian
  ansible.builtin.stat:
    path: /usr/bin/batcat
  register: batcat_bin
  when: ansible_facts['os_family'] == 'Debian'

- name: Core | Ensure bat is symlinked on Debian/Ubuntu
  ansible.builtin.file:
    src: /usr/bin/batcat
    dest: /usr/local/bin/bat
    state: link
  become: true
  when: 
    - ansible_facts['os_family'] == 'Debian'
    - batcat_bin.stat.exists

- name: Core | Install basic dependencies (RedHat/Fedora)
  ansible.builtin.dnf:
    name:
      - curl
      - git
      - stow
      - zsh
      - fd-find
      - ripgrep
      - eza
      - fzf
      - bat
      - ca-certificates
      - gcc
      - make
      - unzip
      - gettext
      - fastfetch
      - zathura
      - zathura-plugins-all
      - gammastep
      - gamemode
    state: present
    update_cache: true
  become: true
  when: ansible_facts['os_family'] == 'RedHat'

- name: System | Configure greetd
  ansible.builtin.copy:
    src: "{{ dotfiles_dir }}/greetd/config.toml"
    dest: /etc/greetd/config.toml
    owner: root
    group: root
    mode: '0644'
  become: true
  when: ansible_facts['os_family'] == 'Debian'

- name: System | Ensure greetd service is enabled
  ansible.builtin.systemd:
    name: greetd
    state: started
    enabled: yes
  become: true
  when: ansible_facts['os_family'] == 'Debian'
