---
- name: Flatpak | Add Flathub repository
  ansible.builtin.shell: flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
  become: true
  register: flathub_res
  changed_when: flathub_res.rc == 0
  failed_when: flathub_res.rc != 0 and "already exists" not in flathub_res.stderr

- name: Flatpak | Ensure XDG_DATA_DIRS is set correctly
  ansible.builtin.lineinfile:
    path: /etc/profile.d/flatpak.sh
    line: 'export XDG_DATA_DIRS="${XDG_DATA_DIRS:-/usr/local/share:/usr/share}:/var/lib/flatpak/exports/share:$HOME/.local/share/flatpak/exports/share"'
    create: yes
    mode: '0644'
  become: true

- name: Flatpak | Install applications
  community.general.flatpak:
    name:
      - com.github.wwmm.easyeffects
    state: present
  register: flatpak_install
  until: flatpak_install is success
  retries: 3
  delay: 5

