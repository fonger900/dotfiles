# ==========================================
# Lynx Configuration File
# ==========================================

# Use UTF-8 for everything
CHARACTER_SET:UTF-8
ASSUME_CHARSET:UTF-8
PREFERRED_CHARSET:utf-8

# Interface Settings
SHOW_CURSOR:TRUE
DEFAULT_USER_MODE:ADVANCED
USE_MOUSE:TRUE
ENABLE_SCROLLBACK:TRUE
VI_KEYS_ALWAYS_ON:TRUE

# Cookies and Navigation
ACCEPT_ALL_COOKIES:TRUE
DEFAULT_INDEX_MODE:TRUE
STARTFILE:http://google.com
HELPFILE:http://lynx.invisible-island.net/lynx_help/lynx_help_main.html

# SSL Settings
FORCE_SSL_PROMPT:YES
SSL_CERT_FILE:/etc/ssl/certs/ca-certificates.crt
FORCE_HTTPS:TRUE

# Color Settings (using standard mappings)
COLOR:0:black:white
COLOR:1:blue:white
COLOR:2:yellow:blue
COLOR:3:green:white
COLOR:4:magenta:white
COLOR:5:cyan:white
COLOR:6:red:white
COLOR:7:magenta:cyan

# Appearance
PRETTYSRC:TRUE
PRETTYSRC_SPEC:span.html_table:color=blue
PRETTYSRC_SPEC:span.html_tr:color=blue
PRETTYSRC_SPEC:span.html_td:color=blue
PRETTYSRC_SPEC:span.html_th:color=blue

# Keybindings
KEYBOARD_LAYOUT:PC_US_STYLE
