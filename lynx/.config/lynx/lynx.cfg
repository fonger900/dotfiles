# ==========================================
# Lynx Configuration File
# ==========================================

# ── Encoding ──────────────────────────────
CHARACTER_SET:UTF-8
ASSUME_CHARSET:UTF-8
PREFERRED_CHARSET:utf-8
DISPLAY_CHARSET:utf-8

# ── Interface ─────────────────────────────
SHOW_CURSOR:TRUE
DEFAULT_USER_MODE:ADVANCED
USE_MOUSE:TRUE
VI_KEYS_ALWAYS_ON:TRUE
SHOW_SCROLLBAR:TRUE
SCROLLBAR_STYLE:2
COLLAPSE_BR_TAGS:TRUE
WRAP_LINES_ON_DUMP:FALSE
NUMBER_LINKS:FALSE

# ── Navigation & Defaults ─────────────────
STARTFILE:https://duckduckgo.com
HELPFILE:https://lynx.invisible-island.net/lynx_help/lynx_help_main.html
DEFAULT_INDEX_FILE:https://duckduckgo.com
EDITOR:nvim

# ── Bookmarks ─────────────────────────────
BOOKMARK_FILE:~/.local/share/lynx/bookmarks.html
MULTI_BOOKMARK_SUPPORT:ADVANCED

# ── Cache & Timeouts ──────────────────────
MAX_CACHE_FILE:10
CONNECT_TIMEOUT:30
READ_TIMEOUT:60

# ── Cookies ───────────────────────────────
ACCEPT_ALL_COOKIES:TRUE
COOKIE_FILE:~/.local/share/lynx/cookies.txt
COOKIE_SAVE_FILE:~/.local/share/lynx/cookies.txt

# ── SSL & Security ────────────────────────
FORCE_SSL_PROMPT:NO
SSL_CERT_FILE:/etc/ssl/certs/ca-certificates.crt

# ── Color & Style ─────────────────────────
# Note: LYNX_LSS env var (set in exports.zsh) also points to the lss file.
# COLOR_STYLE here uses the absolute path since lynx does not expand ~.
COLOR_STYLE:~/.config/lynx/lynx.lss
DEFAULT_COLORS:TRUE
ASSUME_COLOR:TRUE

# ── Appearance ────────────────────────────
PRETTYSRC:TRUE

# ── Downloads ─────────────────────────────
SAVE_SPACE:~/.local/share/lynx/downloads

# ── Keybindings ───────────────────────────
KEYBOARD_LAYOUT:PC_US_STYLE
